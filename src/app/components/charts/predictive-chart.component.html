<div class="chart-container">
  <div class="chart-header">
    <div>
      <h3>Demanda vs Predicción</h3>
      <p>Comparación entre datos históricos y proyecciones futuras</p>
    </div>
    <div class="chart-controls">
      <button mat-stroked-button>
        <mat-icon>download</mat-icon>
        Exportar
      </button>
      <button mat-stroked-button>
        <mat-icon>filter_list</mat-icon>
        Filtros
      </button>
    </div>
  </div>
  
  <div id="chart">
    <apx-chart 
      [series]="chartOptions.series"
      [chart]="chartOptions.chart"
      [xaxis]="chartOptions.xaxis"
      [yaxis]="chartOptions.yaxis"
      [stroke]="chartOptions.stroke"
      [dataLabels]="chartOptions.dataLabels"
      [grid]="chartOptions.grid"
      [markers]="chartOptions.markers"
      [title]="chartOptions.title"
      [legend]="chartOptions.legend"
      [tooltip]="chartOptions.tooltip"
      [annotations]="chartOptions.annotations">
    </apx-chart>
  </div>
  
  <div class="chart-footer">
    <div class="legend-info">
      <div class="legend-item">
        <div class="legend-color historical"></div>
        <span>Datos Reales</span>
      </div>
      <div class="legend-item">
        <div class="legend-color prediction"></div>
        <span>Predicción (Test)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color projection"></div>
        <span>Predicción Futura</span>
      </div>
    </div>
    <div class="metrics-info">
      <div class="metric-badge">
        <mat-icon>analytics</mat-icon>
        <span>MAPE: <strong>{{ mape }}%</strong></span>
      </div>
      <div class="metric-badge r2-badge">
        <mat-icon>show_chart</mat-icon>
        <span>R²: <strong>{{ r2 }}</strong></span>
      </div>
    </div>
  </div>
</div>
